<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { padding: 20px; border: 1px solid #e0e0e0; border-radius: 8px; max-width: 600px; margin: 0 auto; }
        .header { background-color: #ef4444; color: white; padding: 10px; text-align: center; border-radius: 8px 8px 0 0; }
        .content { padding: 20px; }
        .footer { font-size: 12px; color: #777; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Booking Cancelled</h2>
        </div>
        <div class="content">
            <p>Hi <strong>{{ user.username }}</strong>,</p>
            <p>Your booking for <strong>{{ event.title }}</strong> has been successfully cancelled.</p>
            <p>If your ticket was paid, a refund has been initiated.</p>
        </div>
        <div class="footer">
            &copy; 2026 Event Platform
        </div>
    </div>
</body>
</html>
